# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Bundled features. Each package co-locates all HA integrations (sensors,
# shell_commands, automations, ...) for one feature in a single file.
homeassistant:
  packages:
    nixos_rebuild: !include nixos_rebuild_package.yaml

# UI-managed automations live in automations.yaml. This file is owned by the UI
# and is intentionally NOT deployed by the NixOS activation script, so UI edits
# survive rebuilds. See application-homeassistant.nix.
automation: !include automations.yaml

script: !include scripts.yaml
scene: !include scenes.yaml

# Network configuration (reverse proxy)
http:
  server_port: 4002
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - 192.168.1.100