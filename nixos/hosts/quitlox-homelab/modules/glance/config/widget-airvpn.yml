- type: custom-api
  title: AirVPN
  title-url: https://airvpn.org
  icon: mdi:vpn
  cache: 30s
  url: https://airvpn.org/api/?format=json&key=${AIRVPN_API_KEY}&service=userinfo
  subrequests:
    devices:
      url: https://airvpn.org/api/?format=json&key=${AIRVPN_API_KEY}&service=devices
    now:
      url: https://worldtimeapi.org/api/ip
  template: |
    {{ $code := .Response.StatusCode }}
    {{ $devReq := .Subrequest "devices" }}
    {{ $nowReq := .Subrequest "now" }}
    {{ if or (ne $code 200) (ne $devReq.Response.StatusCode 200) (ne $nowReq.Response.StatusCode 200) }}
      <div class="color-negative text-center">
        <p>AirVPN API returned an error.</p>
      </div>
    {{ else if or (ne (.JSON.String "result") "ok") (ne ($devReq.JSON.String "result") "ok") }}
      <div class="color-negative text-center">
        <p>{{ .JSON.String "result" }}</p>
        <p class="size-sm">Check your AirVPN API key.</p>
      </div>
    {{ else }}
      {{ $nowUnix := $nowReq.JSON.Int "unixtime" }}
      {{ $devices := $devReq.JSON.Array "devices" }}
      {{ $connected := false }}
      {{ $deviceName := "" }}
      {{ $deviceIP := "" }}
      {{ $lastDate := "" }}
      {{ range $d := $devices }}
        {{ $lastTo := $d.Int "vpn_last_to_unix" }}
        {{ if gt $lastTo (sub $nowUnix 600) }}
          {{ $connected = true }}
          {{ $deviceName = $d.String "name" }}
          {{ $deviceIP = $d.String "wireguard_ipv4" }}
          {{ $lastDate = $d.String "vpn_last_to_date" }}
        {{ end }}
      {{ end }}
      <div class="flex justify-between text-center">
        <div>
          <div class="size-h3{{ if $connected }} color-positive{{ else }} color-negative{{ end }}">
            {{ if $connected }}Connected{{ else }}Offline{{ end }}
          </div>
          <div class="size-h6">STATUS</div>
        </div>
        <div>
          <div class="color-highlight size-h3">{{ .JSON.Int "user.expiration_days" }}</div>
          <div class="size-h6">DAYS LEFT</div>
        </div>
        <div>
          <div class="color-highlight size-h3">{{ if .JSON.Bool "user.premium" }}Premium{{ else }}Free{{ end }}</div>
          <div class="size-h6">PLAN</div>
        </div>
      </div>
      {{ if $connected }}
      <div style="margin-top: 15px;">
        <ul class="list" style="--list-gap: 8px;">
          <li class="flex justify-between">
            <span class="color-paragraph">Device</span>
            <span class="color-highlight">{{ $deviceName }}</span>
          </li>
          <li class="flex justify-between">
            <span class="color-paragraph">WG IP</span>
            <span class="color-highlight">{{ $deviceIP }}</span>
          </li>
          <li class="flex justify-between">
            <span class="color-paragraph">Since</span>
            <span class="size-sm color-highlight">{{ $lastDate }}</span>
          </li>
        </ul>
      </div>
      {{ end }}
    {{ end }}
