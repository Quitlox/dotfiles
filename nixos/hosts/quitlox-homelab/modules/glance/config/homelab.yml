- name: HomeLab
  columns:
    - size: small
      widgets:
        - $include: widget-media-services-infra.yml
        - $include: widget-media-services-health-details.yml
        - $include: widget-qbittorrent-stats.yml
    - size: full
      widgets:
        - $include: widget-media-services.yml
        - $include: widget-applications.yml
        - $include: widget-opencode-activity.yml
    - size: small
      widgets:
        - $include: widget-beszel-server-stats.yml
        - $include: widget-unifi.yml
        - $include: widget-hetzner-dns.yml
        - type: monitor
          cache: 1s
          title: Server
          sites:
            - title: ddns-updater
              icon: mdi:dns
              url: https://home.quitlox.dev/services/ddns
              check-url: https://home.quitlox.dev/services/ddns/health