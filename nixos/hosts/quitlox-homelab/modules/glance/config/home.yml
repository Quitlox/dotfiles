- name: HomeLab
  columns:
    - size: full
      widgets:
        - type: monitor
          cache: 1m
          title: Media Services
          sites:
            - title: Jellyfin
              icon: sh:jellyfin
              url: https://jellyfin.home.quitlox.dev
              check-url: https://jellyfin.home.quitlox.dev/health
            - title: Seerr
              icon: sh:overseerr
              url: https://seerr.home.quitlox.dev
              check-url: https://seerr.home.quitlox.dev/api/v1/status
            - title: qBittorrent
              icon: sh:qbittorrent
              url: https://qbittorrent.home.quitlox.dev
        - type: monitor
          cache: 1m
          title: Media Services - Infra
          style: compact
          sites:
            - title: Prowlarr
              icon: sh:prowlarr
              url: https://prowlarr.home.quitlox.dev
              check-url: https://prowlarr.home.quitlox.dev/api/v1/health?apikey=${PROWLARR_APIKEY}
            - title: Radarr
              icon: sh:radarr
              url: https://radarr.home.quitlox.dev
              check-url: https://radarr.home.quitlox.dev/api/v3/health?apikey=${RADARR_APIKEY}
            - title: Sonarr
              icon: sh:sonarr
              url: https://sonarr.home.quitlox.dev
              check-url: https://sonarr.home.quitlox.dev/api/v3/health?apikey=${SONARR_APIKEY}
            - title: Bazarr
              icon: sh:bazarr
              url: https://bazarr.home.quitlox.dev
              check-url: https://bazarr.home.quitlox.dev/api/system/ping
            - title: Profilarr
              icon: si:sonarr
              url: https://profilarr.home.quitlox.dev
              check-url: https://profilarr.home.quitlox.dev/api/v1/health
            - title: cross-seed
              icon: mdi:vector-link
              url: http://quitlox-homelab.local:2112
              check-url: http://quitlox-homelab.local:2112/api/ping
        - $include: widget-media-status.yml
    - size: small
      widgets:
        - type: monitor
          cache: 1m
          title: Server
          sites:
            - title: ddns-updater
              icon: mdi:dns
              url: https://home.quitlox.dev/services/ddns
              check-url: https://home.quitlox.dev/services/ddns/health
        - type: custom-api
          title: Hetzner DNS
          title-url: https://dns.hetzner.com
          cache: 5m
          url: https://api.hetzner.cloud/v1/zones
          headers:
            Authorization: Bearer ${HETZNER_CLOUD_APIKEY}
            Accept: application/json
          template: |
            {{ $code := .Response.StatusCode }}
            {{ if eq $code 200 }}
              <ul class="list list-gap-10">
              {{ range .JSON.Array "zones" }}
                <li>
                  <div class="flex items-center justify-between gap-10">
                    <a class="size-h5 color-highlight text-truncate block" href="https://console.hetzner.com/projects/${HETZNER_PROJECT_ID}/dns/{{ .String "id" }}/records">{{ .String "name" }}</a>
                    {{ $status := .String "status" }}
                    <span class="size-h6{{ if eq $status "ok" }} color-positive{{ else }} color-negative{{ end }}">{{ $status }}</span>
                  </div>
                  <ul class="list-horizontal-text">
                    <li>{{ .Int "record_count" }} records</li>
                    <li>TTL {{ .Int "ttl" }}</li>
                  </ul>
                </li>
              {{ end }}
              </ul>
            {{ else if eq $code 401 }}
              <p class="size-h5 color-negative">Hetzner API returned HTTP 401 Unauthorized.</p>
              <p class="size-h6 color-paragraph">DDNS will not be able to update DNS records with a dynamic IP address.</p>
            {{ else }}
              <p class="size-h5 color-negative">Hetzner API returned HTTP {{ $code }}.</p>
              <p class="size-h6 color-paragraph">DDNS updates may fail while this persists.</p>
            {{ end }}
    - size: small
      widgets: []
