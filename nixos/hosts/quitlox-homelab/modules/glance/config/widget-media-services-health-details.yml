- type: custom-api
  title: Media Services - Health Details
  cache: 1m
  skip-json-validation: true
  url: https://prowlarr.home.quitlox.dev/api/v1/health
  headers:
    X-Api-Key: ${PROWLARR_APIKEY}
  template: |
    {{ $prowlarr := . }}
    {{ $radarr := newRequest "https://radarr.home.quitlox.dev/api/v3/health" | withHeader "X-Api-Key" "${RADARR_APIKEY}" | getResponse }}
    {{ $sonarr := newRequest "https://sonarr.home.quitlox.dev/api/v3/health" | withHeader "X-Api-Key" "${SONARR_APIKEY}" | getResponse }}
    {{ $bazarr := newRequest "https://bazarr.home.quitlox.dev/api/system/health" | withHeader "X-Api-Key" "${BAZARR_APIKEY}" | getResponse }}

    {{ $prowlarrOk := eq $prowlarr.Response.StatusCode 200 }}
    {{ $radarrOk := eq $radarr.Response.StatusCode 200 }}
    {{ $sonarrOk := eq $sonarr.Response.StatusCode 200 }}
    {{ $bazarrOk := eq $bazarr.Response.StatusCode 200 }}

    {{ $allUp := and $prowlarrOk $radarrOk $sonarrOk $bazarrOk }}
    {{ $allClear := and $allUp (eq (len $prowlarr.JSON.Array "") 0) (eq (len $radarr.JSON.Array "") 0) (eq (len $sonarr.JSON.Array "") 0) (eq (len $bazarr.JSON.Array "data") 0) }}

    {{ if $allClear }}
      <div class="color-positive">All systems operational</div>
    {{ else }}
      <ul class="list list-gap-10">
        {{ if $prowlarrOk }}
          {{ range $issue := $prowlarr.JSON.Array "" }}
            <li class="flex items-start gap-10">
              <span class="{{ if eq ($issue.String "type") "error" }}color-negative{{ else }}color-highlight{{ end }}">&#9679;</span>
              <span><a href="https://prowlarr.home.quitlox.dev" class="color-highlight">Prowlarr</a>: {{ $issue.String "message" }}</span>
            </li>
          {{ end }}
        {{ else }}
          <li class="flex items-start gap-10">
            <span class="color-negative">&#9679;</span>
            <span><a href="https://prowlarr.home.quitlox.dev" class="color-highlight">Prowlarr</a>: Offline ({{ $prowlarr.Response.Status }})</span>
          </li>
        {{ end }}

        {{ if $radarrOk }}
          {{ range $issue := $radarr.JSON.Array "" }}
            <li class="flex items-start gap-10">
              <span class="{{ if eq ($issue.String "type") "error" }}color-negative{{ else }}color-highlight{{ end }}">&#9679;</span>
              <span><a href="https://radarr.home.quitlox.dev" class="color-highlight">Radarr</a>: {{ $issue.String "message" }}</span>
            </li>
          {{ end }}
        {{ else }}
          <li class="flex items-start gap-10">
            <span class="color-negative">&#9679;</span>
            <span><a href="https://radarr.home.quitlox.dev" class="color-highlight">Radarr</a>: Offline ({{ $radarr.Response.Status }})</span>
          </li>
        {{ end }}

        {{ if $sonarrOk }}
          {{ range $issue := $sonarr.JSON.Array "" }}
            <li class="flex items-start gap-10">
              <span class="{{ if eq ($issue.String "type") "error" }}color-negative{{ else }}color-highlight{{ end }}">&#9679;</span>
              <span><a href="https://sonarr.home.quitlox.dev" class="color-highlight">Sonarr</a>: {{ $issue.String "message" }}</span>
            </li>
          {{ end }}
        {{ else }}
          <li class="flex items-start gap-10">
            <span class="color-negative">&#9679;</span>
            <span><a href="https://sonarr.home.quitlox.dev" class="color-highlight">Sonarr</a>: Offline ({{ $sonarr.Response.Status }})</span>
          </li>
        {{ end }}

        {{ if $bazarrOk }}
          {{ range $issue := $bazarr.JSON.Array "data" }}
            <li class="flex items-start gap-10">
              <span class="color-negative">&#9679;</span>
              <span><a href="https://bazarr.home.quitlox.dev" class="color-highlight">Bazarr</a>: {{ $issue.String "object" }} - {{ $issue.String "issue" }}</span>
            </li>
          {{ end }}
        {{ else }}
          <li class="flex items-start gap-10">
            <span class="color-negative">&#9679;</span>
            <span><a href="https://bazarr.home.quitlox.dev" class="color-highlight">Bazarr</a>: Offline ({{ $bazarr.Response.Status }})</span>
          </li>
        {{ end }}
      </ul>
    {{ end }}
